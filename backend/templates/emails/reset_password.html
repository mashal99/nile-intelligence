<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Reset Password - Nile Intelligence</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f8fafc;">
  <div style="background: #1a56db; padding: 24px; border-radius: 8px 8px 0 0; text-align: center;">
    <h1 style="color: white; margin: 0; font-size: 24px;">Nile Intelligence</h1>
  </div>
  <div style="background: white; padding: 32px; border-radius: 0 0 8px 8px; border: 1px solid #e5e7eb;">
    <h2 style="color: #111827;">Reset Your Password</h2>
    <p style="color: #6b7280;">Hi {{ user.full_name }}, click below to reset your password. This link expires in 2 hours.</p>
    <div style="text-align: center; margin: 32px 0;">
      <a href="{{ reset_url }}" style="background: #dc2626; color: white; padding: 14px 32px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 16px;">
        Reset Password
      </a>
    </div>
    <p style="color: #9ca3af; font-size: 14px;">If you didn't request this, ignore this email. Your password won't change.</p>
  </div>
</body>
</html>
