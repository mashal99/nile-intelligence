version: '3.9'

x-backend-env: &backend-env
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.development

services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nile_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery-worker:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: celery -A celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    command: celery -A celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  flower:
    build:
      context: .
      dockerfile: docker/celery.Dockerfile
    <<: *backend-env
    volumes:
      - ./backend:/app
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A celery_app flower --port=5555

  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    <<: *backend-env
    volumes:
      - ./scrapers:/app
      - ./backend:/app/backend
    depends_on:
      - postgres
    profiles:
      - scraping

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  media_data:
