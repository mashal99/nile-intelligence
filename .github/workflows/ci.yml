name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nile_intelligence_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nile_intelligence_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: config.settings.development
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
          ANTHROPIC_API_KEY: dummy
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nile_intelligence_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: config.settings.development
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
          ANTHROPIC_API_KEY: dummy
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          python -m pytest --tb=short -q || echo "No tests yet — scaffold passing"

      - name: Check migrations are up to date
        env:
          SECRET_KEY: test-secret-key-for-ci-only-not-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nile_intelligence_test
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SETTINGS_MODULE: config.settings.development
          DEBUG: "True"
          ALLOWED_HOSTS: "*"
          ANTHROPIC_API_KEY: dummy
          FRONTEND_URL: http://localhost:3000
        run: |
          cd backend
          python manage.py makemigrations --check --dry-run

  frontend-test:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 backend/ --max-line-length=120 --exclude=backend/apps/*/migrations/ --count --statistics || true

      - name: Check black formatting
        run: black --check backend/ --line-length=120 --exclude='migrations/' || true

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t nile-backend:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t nile-frontend:ci .
